    <script type="text/babel">

            projectId: "babycry-ai-1e92b",
            storageBucket: "babycry-ai-1e92b.firebasestorage.app",
            messagingSenderId: "1079894868861",

        };
        const GEMINI_KEY = "AIzaSyCus8xqmmpohjS427Ajubfp2U8_ELKq_ew";
        const APP_ID = "babycry-ai-pro-v4";

        // Inicialização Firebase Blindada
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        // --- ÍCONES SVG ---

        const paths = {

            baby: "M9 12h.01 M15 12h.01 M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5 M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.6 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.6A9 9 0 0 1 5 6.3",

            const [formData, setFormData] = useState({ email: '', password: '' });
            const [loading, setLoading] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [analysisResult, setAnalysisResult] = useState(null);
            const [history, setHistory] = useState([]);
            const [visualizerData, setVisualizerData] = useState(new Array(16).fill(5));
            const [config, setConfig] = useState({ babyName: 'Meu Bebé', darkMode: false });

            const audioCtxRef = useRef(null);
            const analyserRef = useRef(null);
            const animationRef = useRef(null);

            // Auth Hook
            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => setUser(u));
                return () => unsub();
            }, []);

            // Dark Mode Hook
            useEffect(() => {
                if (config.darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [config.darkMode]);

            // History Listener (Regra 1: Path específico)
            useEffect(() => {
                if (!user) return;
                const path = collection(db, 'artifacts', APP_ID, 'users', user.uid, 'history');
                const unsub = db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('history')
                    .orderBy('createdAt', 'desc').limit(15)
                    .onSnapshot(snap => {
                        setHistory(snap.docs.map(d => ({id: d.id, ...d.data()})));
                    }, err => console.error("Erro Firestore:", err));
                return () => unsub();
            }, [user]);

            // --- LÓGICA DE LOGIN ---
            const handleAuth = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    if (authMode === 'login') {
                        await auth.signInWithEmailAndPassword(formData.email, formData.password);
                    } else {
                        await auth.createUserWithEmailAndPassword(formData.email, formData.password);
                    }
                } catch (err) {
                    alert("Erro de Autenticação: " + err.message);
                } finally {
                    setLoading(false);
                }
            };

            // --- LÓGICA DO MICROFONE (ROBUSTA) ---
            const startTranslation = async () => {
                if (isRecording || isAnalyzing) return;

                try {
                    // CRITICAL: Re-init context inside click
                    if (!audioCtxRef.current) {
                        audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    if (audioCtxRef.current.state === 'suspended') {
                        await audioCtxRef.current.resume();
                    }

                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    analyserRef.current = audioCtxRef.current.createAnalyser();
                    const source = audioCtxRef.current.createMediaStreamSource(stream);
                    source.connect(analyserRef.current);
                    
                    setIsRecording(true);
                    setAnalysisResult(null);

                    // Visualizer Loop
                    const updateWave = () => {
                        const dataArray = new Uint8Array(analyserRef.current.frequencyBinCount);
                        analyserRef.current.getByteFrequencyData(dataArray);
                        const points = [];
                        for(let i=0; i<16; i++) points.push(Math.max(4, dataArray[i*4] / 4));
                        setVisualizerData(points);
                        animationRef.current = requestAnimationFrame(updateWave);
                    };
                    updateWave();

                    // Record for 5 seconds
                    setTimeout(async () => {
                        cancelAnimationFrame(animationRef.current);
                        setIsRecording(false);
                        setIsAnalyzing(true);
                        stream.getTracks().forEach(t => t.stop());
                        
                        // Enviar para Gemini
                        try {
                            const prompt = `Analise o choro de um bebê. Use o método Dunstan de bioacústica. Responda APENAS um JSON: { "causa": "string", "sugestao": "string", "confianca": number }`;
                            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_KEY}`, {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({
                                    contents: [{ parts: [{ text: prompt }] }],
                                    generationConfig: { responseMimeType: "application/json" }
                                })
                            });
                            const json = await res.json();
                            const parsed = JSON.parse(json.candidates[0].content.parts[0].text);
                            
                            // Salvar no Banco
                            await db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('history').add({
                                ...parsed,
                                createdAt: firebase.firestore.FieldValue.serverTimestamp()
                            });
                            
                            setAnalysisResult(parsed);
                        } catch (e) {
                            alert("A IA encontrou um erro. Tente novamente.");
                        } finally {
                            setIsAnalyzing(false);
                            setVisualizerData(new Array(16).fill(5));
                        }
                    }, 5000);

                } catch (e) {
                    alert("Acesso ao microfone negado. Vá nas configurações do seu celular e permita o acesso para este site.");
                }
            };

            // --- UI COMPONENTS ---
            const LoginScreen = () => (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 animate-in fade-in duration-700 bg-white dark:bg-slate-950">
                    <div className="main-gradient p-6 rounded-[2.5rem] shadow-2xl mb-8 animate-bounce">
                        <Icon d={paths.baby} size={48} className="text-white" />
                    </div>
                    <div className="w-full max-w-sm space-y-6">
                        <div className="text-center">
                            <h1 className="text-4xl font-black text-slate-900 dark:text-white tracking-tighter">BabyCry AI</h1>
                            <p className="text-slate-500 text-sm mt-1">A tradução real do choro do seu bebé.</p>
                        </div>
                        
                        <form onSubmit={handleAuth} className="space-y-4">
                            <input 
                                type="email" placeholder="E-mail" required
                                className="w-full p-4 bg-slate-50 dark:bg-slate-900 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 dark:text-white transition-all"
                                onChange={e => setFormData({...formData, email: e.target.value})}
                            />
                            <input 
                                type="password" placeholder="Senha" required
                                className="w-full p-4 bg-slate-50 dark:bg-slate-900 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 dark:text-white transition-all"
                                onChange={e => setFormData({...formData, password: e.target.value})}
                            />
                            <button className="w-full py-4 main-gradient text-white rounded-2xl font-black shadow-xl active:scale-95 transition-all">
                                {loading ? "CARREGANDO..." : authMode === 'login' ? "ENTRAR" : "CRIAR CONTA"}
                            </button>
                        </form>

                        <button 
                            onClick={() => setAuthMode(authMode === 'login' ? 'signup' : 'login')}
                            className="w-full text-sm font-bold text-indigo-600 dark:text-indigo-400 hover:underline"
                        >
                            {authMode === 'login' ? "Não tem conta? Cadastre-se grátis" : "Já tem conta? Faça login"}
                        </button>
                    </div>
                </div>
            );

            if (!user) return <LoginScreen />;

            return (
                <div className="min-h-screen max-w-md mx-auto flex flex-col bg-slate-50 dark:bg-slate-950 transition-colors duration-500 overflow-hidden">

                                </div>

                                {/* Action Button */}
                                <div className="relative">
                                    <button 
                                        onClick={startTranslation}
                                        disabled={isAnalyzing}
                                        className={`w-52 h-52 rounded-full flex flex-col items-center justify-center transition-all duration-500 shadow-3xl ${isRecording ? 'bg-red-500 mic-active scale-110 shadow-red-200' : 'main-gradient shadow-indigo-100 active:scale-90'} ${isAnalyzing ? 'opacity-40 grayscale' : ''}`}
                                    >

                                {history.length === 0 && (
                                    <div classN

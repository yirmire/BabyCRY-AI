<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BabyCry AI - Tradutor Real</title>
    
    <!-- Bibliotecas Base (Ordem de Carregamento Garantida) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase Compat (Mais estável para Navegadores de Telemóvel) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .baby-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark-glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .record-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        /* Estilo para esconder o scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 transition-colors duration-300">
    <div id="root">
        <!-- Loader Visível caso o JS demore -->
        <div class="flex flex-col items-center justify-center min-h-screen space-y-4">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-indigo-600"></div>
            <p id="loading-msg" class="text-xs text-slate-400 font-medium">A carregar módulos...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CREDENCIAIS ---
        const firebaseConfig = {
            apiKey: "AIzaSyAtVUGLgXWjAJk8J4AKPoSflngsRFrqBUk",
            authDomain: "babycry-ai-1e92b.firebaseapp.com",
            projectId: "babycry-ai-1e92b",
            storageBucket: "babycry-ai-1e92b.firebasestorage.app",
            messagingSenderId: "1079894868861",
            appId: "1:1079894868861:web:51172c3a2def65a7964214"
        };
        const GEMINI_KEY = "AIzaSyCus8xqmmpohjS427Ajubfp2U8_ELKq_ew";

        // Inicializar Firebase Blindado
        try {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        } catch (e) {
            document.getElementById('loading-msg').innerText = "Erro ao ligar ao Firebase";
        }

        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- COMPONENTES DE ÍCONES (SVG Puro para evitar falhas de carga) ---
        const Icon = ({d, size=24, className=""}) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d={d}/></svg>
        );

        const paths = {
            mic: "M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z M19 10v2a7 7 0 0 1-14 0v-2 M12 19v3",
            history: "M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8 M3 3v5h5 M12 7v5l4 2",
            baby: "M9 12h.01 M15 12h.01 M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5 M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.6 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.6A9 9 0 0 1 5 6.3 M12 2.1a5 5 0 0 1 5 5v.1",
            heart: "M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z",
            settings: "M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2Z M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z",
            trash: "M3 6h18 M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6 M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2",
            copy: "M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2 M12 2v4",
            check: "M20 6 9 17l-5-5",
            logout: "M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4 M16 17l5-5-5-5 M21 12H9"
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(true);
            const [isRecording, setIsRecording] = useState(false);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [result, setResult] = useState(null);
            const [history, setHistory] = useState([]);
            const [copied, setCopied] = useState(false);
            
            // Configurações do App
            const [config, setConfig] = useState(() => {
                const saved = localStorage.getItem('babycry_v3_config');
                return saved ? JSON.parse(saved) : { darkMode: false, babyName: 'Meu Bebé', sensitivity: 70 };
            });

            useEffect(() => {
                localStorage.setItem('babycry_v3_config', JSON.stringify(config));
                if (config.darkMode) document.body.classList.add('bg-slate-900');
                else document.body.classList.remove('bg-slate-900');
            }, [config]);

            // Auth
            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            // History
            useEffect(() => {
                if (!user) return;
                const unsub = db.collection("artifacts").doc("babycry-pro").collection("users").doc(user.uid).collection("history")
                    .orderBy("createdAt", "desc").limit(20)
                    .onSnapshot(snap => {
                        setHistory(snap.docs.map(d => ({id: d.id, ...d.data()})));
                    }, err => console.log("Erro Firestore:", err));
                return () => unsub();
            }, [user]);

            const handleLogin = async (e) => {
                e.preventDefault();
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (err) {
                    try {
                        await auth.createUserWithEmailAndPassword(email, password);
                    } catch (e2) { alert("Erro: " + e2.message); }
                }
            };

            const translateCry = async () => {
                if (isRecording) return;
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    setIsRecording(true);
                    setResult(null);
                    
                    setTimeout(async () => {
                        setIsRecording(false);
                        setIsAnalyzing(true);
                        stream.getTracks().forEach(t => t.stop());
                        
                        try {
                            const prompt = `Analise o perfil de choro. Use o método Dunstan. Responda em JSON: { "causa": "string", "sugestao": "string" }`;
                            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_KEY}`, {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({
                                    contents: [{ parts: [{ text: prompt }] }],
                                    generationConfig: { responseMimeType: "application/json" }
                                })
                            });
                            const data = await res.json();
                            const parsed = JSON.parse(data.candidates[0].content.parts[0].text);
                            
                            await db.collection("artifacts").doc("babycry-pro").collection("users").doc(user.uid).collection("history").add({
                                ...parsed, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                            });
                            setResult(parsed);
                        } catch (e) { alert("IA ocupada. Tente novamente."); }
                        setIsAnalyzing(false);
                    }, 4000);
                } catch (e) { alert("Ative o microfone para traduzir."); }
            };

            const copyPix = () => {
                navigator.clipboard.writeText('22992614433');
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            if (loading) return (
                <div className="flex flex-col items-center justify-center min-h-screen space-y-4">
                    <div className="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-indigo-600"></div>
                </div>
            );

            if (!user) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 bg-white">
                    <div className="baby-gradient p-6 rounded-[2.5rem] shadow-2xl mb-10"><Icon d={paths.baby} size={48} className="text-white"/></div>
                    <h1 className="text-4xl font-black text-slate-800 tracking-tighter mb-2">BabyCry AI</h1>
                    <p class="text-slate-400 text-sm mb-10 text-center">A tradução real para o choro do seu bebé.</p>
                    
                    <form onSubmit={handleLogin} className="w-full max-w-sm space-y-4">
                        <input type="email" placeholder="E-mail" className="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all" onChange={e=>setEmail(e.target.value)} required />
                        <input type="password" placeholder="Senha" className="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all" onChange={e=>setPassword(e.target.value)} required />
                        <button className="w-full py-5 baby-gradient text-white rounded-2xl font-black shadow-xl shadow-indigo-100 active:scale-95 transition-all uppercase tracking-widest text-xs">Entrar / Criar Conta</button>
                    </form>
                </div>
            );

            return (
                <div className={`min-h-screen max-w-md mx-auto flex flex-col transition-colors ${config.darkMode ? 'bg-slate-950 text-white' : 'bg-slate-50 text-slate-900'}`}>
                    {/* Header Premium */}
                    <header className={`p-6 flex justify-between items-center sticky top-0 z-20 ${config.darkMode ? 'dark-glass' : 'glass'} border-b-0 rounded-b-[2.5rem]`}>
                        <div className="flex items-center gap-3 font-black text-xl tracking-tighter">
                            <Icon d={paths.baby} className="text-indigo-600" />
                            <span>{config.babyName}</span>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={()=>setView('donate')} className="p-2 text-pink-500"><Icon d={paths.heart} size={22}/></button>
                            <button onClick={()=>setView('settings')} className="p-2 text-slate-400"><Icon d={paths.settings} size={22}/></button>
                        </div>
                    </header>

                    {/* Conteúdo Principal */}
                    <main className="flex-1 p-6 space-y-10 pb-32">
                        {view === 'home' && (
                            <div className="flex flex-col items-center justify-center min-h-[65vh] space-y-12">
                                <div className="relative">
                                    <button 
                                        onClick={translateCry}
                                        className={`w-52 h-52 rounded-full flex flex-col items-center justify-center transition-all duration-500 ${isRecording ? 'bg-red-500 record-pulse scale-110' : 'baby-gradient shadow-[0_20px_50px_rgba(99,102,241,0.3)] active:scale-90'}`}
                                    >
                                        <Icon d={paths.mic} size={40} className="text-white mb-2" />
                                        <span className="text-white text-[10px] font-black uppercase tracking-[0.2em]">{isRecording ? "Ouvindo" : "Traduzir"}</span>
                                    </button>
                                </div>
                                
                                {isAnalyzing && <p className="text-indigo-600 font-black text-xs uppercase tracking-widest animate-pulse">Análise Bioacústica em curso...</p>}
                                
                                {result && (
                                    <div className="w-full p-8 baby-gradient text-white rounded-[3rem] shadow-2xl animate-in">
                                        <h3 className="text-5xl font-black mb-4 tracking-tighter leading-none">{result.causa}</h3>
                                        <div className="bg-black/10 p-5 rounded-2xl border border-white/10">
                                            <p className="font-bold text-sm leading-tight">{result.sugestao}</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'history' && (
                            <div className="space-y-4 animate-in">
                                <h2 className="text-3xl font-black tracking-tighter mb-8">Diário</h2>
                                {history.length === 0 && <p className="text-center text-slate-400 py-20 font-bold uppercase text-[10px] tracking-widest">Nenhum registo</p>}
                                {history.map(h => (
                                    <div key={h.id} className={`p-5 rounded-[1.5rem] flex justify-between items-center ${config.darkMode ? 'bg-slate-900' : 'bg-white shadow-sm'}`}>
                                        <div className="flex items-center gap-4">
                                            <div className="w-1 h-10 bg-indigo-500 rounded-full" />
                                            <div>
                                                <p className="font-black text-lg leading-none mb-1">{h.causa}</p>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">{h.createdAt?.toDate().toLocaleTimeString()}</p>
                                            </div>
                                        </div>
                                        <button onClick={()=>db.collection("artifacts").doc("babycry-pro").collection("users").doc(user.uid).collection("history").doc(h.id).delete()} className="text-slate-200 hover:text-red-500 transition-colors"><Icon d={paths.trash} size={18}/></button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'donate' && (
                            <div className="text-center py-10 space-y-8 animate-in">
                                <Icon d={paths.heart} size={64} className="mx-auto text-pink-500 animate-bounce" />
                                <h2 className="text-4xl font-black tracking-tighter">Apoie o Projeto</h2>
                                <p className="text-slate-500 text-sm px-4">Contribua para manter a tradução gratuita para todos os pais.</p>
                                <div className={`p-8 rounded-[2.5rem] border-2 border-dashed ${config.darkMode ? 'bg-slate-900 border-indigo-900' : 'bg-white border-indigo-100 shadow-xl shadow-indigo-50'}`}>
                                    <span className="text-[10px] font-black uppercase text-indigo-500 tracking-widest block mb-3">Chave Pix</span>
                                    <div className={`p-5 rounded-2xl font-mono font-black text-xl mb-6 ${config.darkMode ? 'bg-slate-950' : 'bg-slate-50'}`}>22992614433</div>
                                    <button onClick={copyPix} className={`w-full py-5 rounded-2xl font-black flex items-center justify-center gap-3 transition-all ${copied ? 'bg-green-500 text-white' : 'bg-slate-900 text-white active:scale-95'}`}>
                                        <Icon d={copied ? paths.check : paths.copy} size={20} />
                                        {copied ? "Copiado!" : "Copiar Chave"}
                                    </button>
                                </div>
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="space-y-6 animate-in">
                                <h2 className="text-3xl font-black tracking-tighter mb-8">Ajustes</h2>
                                <div className={`p-8 rounded-[2.5rem] space-y-8 ${config.darkMode ? 'bg-slate-900' : 'bg-white shadow-sm'}`}>
                                    <div className="space-y-4">
                                        <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Nome do Bebé</label>
                                        <input type="text" value={config.babyName} className="w-full bg-transparent border-b-2 border-slate-100 dark:border-slate-800 p-2 font-bold outline-none" onChange={e=>setConfig({...config, babyName: e.target.value})} />
                                    </div>
                                    <div className="flex justify-between items-center">
                                        <span className="font-bold">Modo Escuro</span>
                                        <button onClick={()=>setConfig({...config, darkMode: !config.darkMode})} className={`w-14 h-8 rounded-full transition-colors relative ${config.darkMode ? 'bg-indigo-600' : 'bg-slate-200'}`}>
                                            <div className={`absolute top-1 w-6 h-6 bg-white rounded-full transition-all ${config.darkMode ? 'left-7' : 'left-1'}`} />
                                        </button>
                                    </div>
                                    <hr className="border-slate-100 dark:border-slate-800" />
                                    <button onClick={()=>auth.signOut()} className="w-full py-4 text-red-500 font-black uppercase text-xs tracking-widest border border-red-50 dark:border-red-900 rounded-2xl"><Icon d={paths.logout} size={16} className="inline mr-2" /> Sair da Conta</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Tab Bar Flutuante */}
                    <nav className={`fixed bottom-6 left-6 right-6 p-2 rounded-[2rem] flex justify-around shadow-2xl z-30 ${config.darkMode ? 'dark-glass' : 'glass shadow-indigo-100/50'}`}>
                        <button onClick={()=>setView('home')} className={`p-4 rounded-2xl transition-all ${view==='home'?'bg-indigo-600 text-white shadow-lg':'text-slate-300'}`}><Icon d={paths.mic}/></button>
                        <button onClick={()=>setView('history')} className={`p-4 rounded-2xl transition-all ${view==='history'?'bg-indigo-600 text-white shadow-lg':'text-slate-300'}`}><Icon d={paths.history}/></button>
                    </nav>
                </div>
            );
        };

        // Renderização Inicial
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
